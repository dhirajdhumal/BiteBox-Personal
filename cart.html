<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BiteBox</title>

    <!-- Font Awesome Link -->
    <script src="https://kit.fontawesome.com/de2326f379.js" crossorigin="anonymous"></script>
    <!-- CSS file Integration -->
    <link rel="stylesheet" href="CSS/style.css">
    <!-- Fevicon icon Integration -->
    <link rel="icon" type="image/x-icon" href="Images/favicon_io/favicon.ico">
    <!-- Google Font Integration -->
</head>
<body>

    <!-- Header section start -->
    <header>
        <nav>
                <!-- Logo  -->
                <img src="./Images/Logo1.png" alt="logo" height="30pxpx">

                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="menu.html" >Menu</a></li>
                    <li><a href="biteDeals.html" >Bite Deals</a></li>
                    <li><a href="cart.html" ><i class="fa-solid fa-cart-plus"></i>Cart</a></li>
                    <li><a href="login.html"><i class="fa-solid fa-right-to-bracket"></i>Login</a></li>
                </ul>
            
        </nav>
    </header>
    <!-- Header section end -->

    <!-- Start cart section -->
    <section class="cart">

        <table>
            <thead>
                <th>Item</th>
                <th>Price</th>
                <th>Qty</th>
                <th>Total</th>
                <th>Remove</th>
            </thead>

            <tbody>
                <tr>
                    <td class="item">
                        <img src="">
                        <div>
                            <h4>Cheese burger</h4>
                            <p>Juicy grilled burger</p>
                        </div>
                    </td>
                    <td>₹150</td>
                    <td>
                        <div class="qty-box">
                            <button>-</button>
                            <span>1</span>
                            <button>+</button>
                        </div>
                    </td>
                    <td>₹150</td>
                    <td><button class="remove">X</button></td>
                </tr>

            </tbody>
        </table>

    </section>
</body>
</html>
